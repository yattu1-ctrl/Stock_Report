<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>チャート表示 | データセンター・半導体 投資判断ツール</title>
  <style>
    :root {
      --bg: #f4f7f5;
      --surface: #ffffff;
      --ink: #18211f;
      --muted: #63716d;
      --line: #d9e1dd;
      --accent: #0f766e;
      --accent-2: #b45309;
      --accent-3: #334155;
      --soft: #e7f4f1;
      --shadow: 0 18px 50px rgba(24, 33, 31, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Meiryo", sans-serif;
      line-height: 1.6;
    }

    .shell {
      width: min(1920px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 5;
      background: rgba(244, 247, 245, .94);
      border-bottom: 1px solid var(--line);
      backdrop-filter: blur(10px);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px 12px;
      color: var(--accent-3);
      font-size: 13px;
      font-weight: 800;
    }

    label {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      min-height: 30px;
      white-space: nowrap;
    }

    select {
      min-height: 34px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--accent-3);
      font: inherit;
      font-weight: 800;
      padding: 3px 8px;
    }

    main {
      padding: 18px 0 28px;
    }

    .chart-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .chart-stage {
      min-height: 620px;
      overflow-x: auto;
    }

    .chart-stage svg {
      display: block;
      width: 100%;
      min-width: 1200px;
      height: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .placeholder {
      display: grid;
      place-items: center;
      min-height: 560px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--muted);
      font-weight: 900;
    }

    .meta {
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <header>
    <div class="shell toolbar">
      <h1 id="chartTitle">チャート</h1>
      <div class="controls" aria-label="チャート設定">
        <label>銘柄<select id="stockSelect"></select></label>
        <label><input type="radio" name="chartPeriod" value="daily" checked>日足</label>
        <label><input type="radio" name="chartPeriod" value="weekly">週足</label>
        <label><input type="radio" name="chartPeriod" value="monthly">月足</label>
        <label><input type="checkbox" class="chart-ma" value="5" checked>5日線</label>
        <label><input type="checkbox" class="chart-ma" value="10">10日線</label>
        <label><input type="checkbox" class="chart-ma" value="25" checked>25日線</label>
        <label><input type="checkbox" class="chart-ma" value="75">75日線</label>
        <label><input type="checkbox" class="chart-ma" value="200">200日線</label>
        <label><input type="checkbox" id="chartRsi">RSI</label>
        <label><input type="checkbox" id="chartMacd">MACD</label>
        <label><input type="checkbox" id="chartIchimoku">一目均衡</label>
        <label><input type="checkbox" id="chartZigzag7">ZigZag(7)</label>
        <label><input type="checkbox" id="chartZigzag20">ZigZag(20)</label>
      </div>
    </div>
  </header>

  <main class="shell">
    <section class="chart-card">
      <div class="chart-stage" id="chartStage">
        <div class="placeholder">チャートを読み込み中です</div>
      </div>
      <div class="meta" id="chartMeta"></div>
    </section>
  </main>

  <script src="data/technical-indicators.js"></script>
  <script src="data/price-history-200d.js"></script>
  <script>
    const title = document.getElementById("chartTitle");
    const stage = document.getElementById("chartStage");
    const meta = document.getElementById("chartMeta");
    const select = document.getElementById("stockSelect");
    let selectedCode = new URLSearchParams(location.search).get("code");

    function aggregateHistory(rows, period) {
      if (period === "daily") return rows;
      const groups = new Map();
      rows.forEach((row) => {
        const date = new Date(`${row.d}T00:00:00+09:00`);
        let key;
        if (period === "monthly") {
          key = row.d.slice(0, 7);
        } else {
          const monday = new Date(date);
          const day = monday.getDay() || 7;
          monday.setDate(monday.getDate() - day + 1);
          key = monday.toISOString().slice(0, 10);
        }
        if (!groups.has(key)) {
          groups.set(key, { d: row.d, o: row.o, h: row.h, l: row.l, c: row.c, v: row.v || 0 });
          return;
        }
        const group = groups.get(key);
        group.h = Math.max(group.h, row.h);
        group.l = Math.min(group.l, row.l);
        group.c = row.c;
        group.v += row.v || 0;
        group.d = row.d;
      });
      return Array.from(groups.values());
    }

    function movingAverage(values, span) {
      return values.map((_, index) => {
        if (index < span - 1) return null;
        const slice = values.slice(index - span + 1, index + 1);
        return slice.reduce((sum, value) => sum + value, 0) / span;
      });
    }

    function ema(values, span) {
      const k = 2 / (span + 1);
      return values.reduce((acc, value, index) => {
        acc.push(index === 0 ? value : value * k + acc[index - 1] * (1 - k));
        return acc;
      }, []);
    }

    function macdSeriesBundle(closes) {
      const ema12 = ema(closes, 12);
      const ema26 = ema(closes, 26);
      const macd = closes.map((_, index) => ema12[index] - ema26[index]);
      const signal = ema(macd, 9);
      const histogram = macd.map((value, index) => value - signal[index]);
      return { macd, signal, histogram };
    }

    function rsiValues(closes, span = 14) {
      return closes.map((_, index) => {
        if (index < span) return null;
        let gains = 0;
        let losses = 0;
        for (let i = index - span + 1; i <= index; i += 1) {
          const diff = closes[i] - closes[i - 1];
          if (diff >= 0) gains += diff;
          else losses -= diff;
        }
        if (losses === 0) return 100;
        const rs = gains / losses;
        return 100 - (100 / (1 + rs));
      });
    }

    function zigzagPoints(rows, depth) {
      const pivots = [];
      for (let i = depth; i < rows.length - depth; i += 1) {
        const windowRows = rows.slice(i - depth, i + depth + 1);
        const high = Math.max(...windowRows.map((row) => row.h));
        const low = Math.min(...windowRows.map((row) => row.l));
        if (rows[i].h === high) pivots.push({ index: i, value: rows[i].h });
        if (rows[i].l === low) pivots.push({ index: i, value: rows[i].l });
      }
      return pivots.filter((point, index, array) => index === 0 || point.index !== array[index - 1].index);
    }

    function ichimokuSeries(rows) {
      const middle = (index, span) => {
        if (index < span - 1) return null;
        const windowRows = rows.slice(index - span + 1, index + 1);
        const high = Math.max(...windowRows.map((row) => row.h));
        const low = Math.min(...windowRows.map((row) => row.l));
        return (high + low) / 2;
      };
      const tenkan = rows.map((_, index) => middle(index, 9));
      const kijun = rows.map((_, index) => middle(index, 26));
      const spanA = rows.map(() => null);
      const spanB = rows.map(() => null);
      const chikou = rows.map(() => null);
      rows.forEach((row, index) => {
        const forwardIndex = index + 26;
        if (Number.isFinite(tenkan[index]) && Number.isFinite(kijun[index])) {
          spanA[forwardIndex] = (tenkan[index] + kijun[index]) / 2;
        }
        const baseB = middle(index, 52);
        if (Number.isFinite(baseB)) spanB[forwardIndex] = baseB;
        const backwardIndex = index - 26;
        if (backwardIndex >= 0) chikou[backwardIndex] = row.c;
      });
      return { tenkan, kijun, spanA, spanB, chikou };
    }

    function svgPath(points) {
      return points.map((point, index) => `${index === 0 ? "M" : "L"}${point.x.toFixed(1)} ${point.y.toFixed(1)}`).join(" ");
    }

    function addCrosshair(svg, config) {
      const ns = "http://www.w3.org/2000/svg";
      const { data, width, top, left, right, mainHeight, chartWidth, maxPrice, minPrice, pad } = config;
      const priceRange = maxPrice - minPrice + pad * 2;
      const yToPrice = (value) => maxPrice + pad - ((value - top) * priceRange / mainHeight);

      svg.addEventListener("click", (event) => {
        const point = svg.createSVGPoint();
        point.x = event.clientX;
        point.y = event.clientY;
        const cursor = point.matrixTransform(svg.getScreenCTM().inverse());
        if (cursor.x < left || cursor.x > width - right || cursor.y < top || cursor.y > top + mainHeight) return;

        const index = Math.max(0, Math.min(data.length - 1, Math.round((cursor.x - left) / chartWidth * (data.length - 1))));
        const crossX = left + (data.length <= 1 ? 0 : index * chartWidth / (data.length - 1));
        const crossY = cursor.y;
        const price = yToPrice(crossY);
        const row = data[index];
        const label = `${row.d} / ${Math.round(price).toLocaleString("ja-JP")}円`;
        const textX = crossX > width - 260 ? crossX - 196 : crossX + 12;
        const textY = crossY < top + 28 ? crossY + 24 : crossY - 10;

        svg.querySelector("#crosshair")?.remove();
        const group = document.createElementNS(ns, "g");
        group.setAttribute("id", "crosshair");
        group.innerHTML = `
          <line x1="${crossX.toFixed(1)}" y1="${top}" x2="${crossX.toFixed(1)}" y2="${top + mainHeight}" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
          <line x1="${left}" y1="${crossY.toFixed(1)}" x2="${width - right}" y2="${crossY.toFixed(1)}" stroke="#334155" stroke-width="1" stroke-dasharray="4 4"/>
          <rect x="${textX - 6}" y="${textY - 17}" width="188" height="24" rx="5" fill="#ffffff" stroke="#334155" opacity=".95"/>
          <text x="${textX}" y="${textY}" fill="#18211f" font-size="12" font-weight="800">${label}</text>
        `;
        svg.appendChild(group);
      });
    }

    function populateStocks() {
      const rows = window.technicalRows || [];
      select.innerHTML = rows.map((row) => (
        `<option value="${row.code}">${row.name} (${row.code}) / ${row.sector}</option>`
      )).join("");
      if (!selectedCode || !rows.some((row) => String(row.code) === String(selectedCode))) {
        selectedCode = rows[0]?.code || "";
      }
      select.value = selectedCode;
    }

    function renderChart() {
      const rows = window.priceHistoryRows?.[selectedCode] || [];
      const stock = (window.technicalRows || []).find((row) => String(row.code) === String(selectedCode));
      if (!rows.length) {
        stage.innerHTML = `<div class="placeholder">チャート用データがありません</div>`;
        title.textContent = "チャート";
        return;
      }
      const period = document.querySelector("input[name='chartPeriod']:checked")?.value || "daily";
      const sourceRows = period === "monthly" && window.priceHistoryMonthlyRows?.[selectedCode]?.length
        ? window.priceHistoryMonthlyRows[selectedCode]
        : rows;
      const limit = period === "daily" ? 260 : period === "weekly" ? 200 : 360;
      const fullData = period === "monthly" ? sourceRows : aggregateHistory(sourceRows, period);
      const data = fullData.slice(-limit);
      const visibleStart = Math.max(0, fullData.length - data.length);
      const closes = data.map((row) => row.c);
      const fullCloses = fullData.map((row) => row.c);
      const selectedMas = Array.from(document.querySelectorAll(".chart-ma:checked")).map((input) => Number(input.value));
      const showRsi = document.getElementById("chartRsi").checked;
      const showMacd = document.getElementById("chartMacd").checked;
      const showIchimoku = document.getElementById("chartIchimoku").checked;
      const showZigzag7 = document.getElementById("chartZigzag7").checked;
      const showZigzag20 = document.getElementById("chartZigzag20").checked;
      const width = 1780;
      const mainHeight = 500;
      const volumeHeight = 110;
      const subHeight = 130;
      const top = 26;
      const left = 68;
      const right = 34;
      const chartWidth = width - left - right;
      const plotCount = showIchimoku ? data.length + 26 : data.length;
      const panels = 1 + (showRsi ? 1 : 0) + (showMacd ? 1 : 0);
      const volumeTop = top + mainHeight + 34;
      const dateLabelY = volumeTop + volumeHeight + 28;
      const height = dateLabelY + 28 + (panels - 1) * subHeight;
      const x = (index) => left + (plotCount <= 1 ? 0 : index * chartWidth / (plotCount - 1));
      const maSeries = Object.fromEntries(selectedMas.map((span) => [
        span,
        movingAverage(fullCloses, span).slice(visibleStart)
      ]));
      const ichimokuFull = showIchimoku ? ichimokuSeries(fullData) : null;
      const ichimokuVisible = showIchimoku ? {
        tenkan: ichimokuFull.tenkan.slice(visibleStart, visibleStart + data.length + 26),
        kijun: ichimokuFull.kijun.slice(visibleStart, visibleStart + data.length + 26),
        spanA: ichimokuFull.spanA.slice(visibleStart, visibleStart + data.length + 26),
        spanB: ichimokuFull.spanB.slice(visibleStart, visibleStart + data.length + 26),
        chikou: ichimokuFull.chikou.slice(visibleStart, visibleStart + data.length + 26)
      } : null;
      const priceValues = data.flatMap((row) => [row.h, row.l])
        .concat(Object.values(maSeries).flat().filter(Number.isFinite))
        .concat(showIchimoku ? Object.values(ichimokuVisible).flat().filter(Number.isFinite) : []);
      const minPrice = Math.min(...priceValues);
      const maxPrice = Math.max(...priceValues);
      const pad = Math.max((maxPrice - minPrice) * 0.08, 1);
      const yPrice = (value) => top + (maxPrice + pad - value) * mainHeight / (maxPrice - minPrice + pad * 2);
      const candleWidth = Math.max(3, Math.min(11, chartWidth / data.length * .62));
      const candles = data.map((row, index) => {
        const cx = x(index);
        const openY = yPrice(row.o);
        const closeY = yPrice(row.c);
        const highY = yPrice(row.h);
        const lowY = yPrice(row.l);
        const up = row.c >= row.o;
        const color = up ? "#2563eb" : "#dc2626";
        const bodyTop = Math.min(openY, closeY);
        const bodyHeight = Math.max(Math.abs(openY - closeY), 1.5);
        return `<line x1="${cx.toFixed(1)}" y1="${highY.toFixed(1)}" x2="${cx.toFixed(1)}" y2="${lowY.toFixed(1)}" stroke="${color}" stroke-width="1.2"/>
          <rect x="${(cx - candleWidth / 2).toFixed(1)}" y="${bodyTop.toFixed(1)}" width="${candleWidth.toFixed(1)}" height="${bodyHeight.toFixed(1)}" fill="${color}" rx="1"/>`;
      }).join("");
      const maColors = { 5: "#2563eb", 10: "#0f766e", 25: "#b45309", 75: "#7c3aed", 200: "#64748b" };
      const boundaryLines = data.map((row, index) => {
        if (index === 0) return "";
        const previous = data[index - 1].d;
        const current = row.d;
        const isBoundary = period === "monthly"
          ? current.slice(0, 4) !== previous.slice(0, 4)
          : current.slice(0, 7) !== previous.slice(0, 7);
        if (!isBoundary) return "";
        const label = period === "monthly" ? current.slice(0, 4) : current.slice(5, 7);
        const xx = x(index);
        return `<line x1="${xx.toFixed(1)}" y1="${top}" x2="${xx.toFixed(1)}" y2="${volumeTop + volumeHeight}" stroke="#d9e1dd" stroke-dasharray="3 5"/><text x="${(xx + 4).toFixed(1)}" y="${dateLabelY - 14}" fill="#63716d" font-size="11">${label}</text>`;
      }).join("");
      const dateLabels = [0, .25, .5, .75, 1].map((ratio) => {
        const index = Math.min(data.length - 1, Math.round((data.length - 1) * ratio));
        const label = period === "monthly" ? data[index].d.slice(0, 7) : data[index].d.slice(5);
        return `<text x="${x(index).toFixed(1)}" y="${dateLabelY}" fill="#334155" font-size="12" text-anchor="middle">${label}</text>`;
      }).join("");
      const grid = [0, .25, .5, .75, 1].map((ratio) => {
        const y = top + ratio * mainHeight;
        const value = maxPrice + pad - ratio * (maxPrice - minPrice + pad * 2);
        return `<line x1="${left}" y1="${y}" x2="${width - right}" y2="${y}" stroke="#e5ebe8"/><text x="10" y="${y + 4}" fill="#63716d" font-size="12">${Math.round(value).toLocaleString("ja-JP")}</text>`;
      }).join("");
      const maLines = selectedMas.map((span, index) => {
        const points = maSeries[span].map((value, pointIndex) => Number.isFinite(value) ? { x: x(pointIndex), y: yPrice(value) } : null).filter(Boolean);
        if (points.length < 2) return "";
        return `<path d="${svgPath(points)}" fill="none" stroke="${maColors[span] || "#334155"}" stroke-width="2"/><text x="${width - right - 88}" y="${top + 18 + index * 18}" fill="${maColors[span] || "#334155"}" font-size="13" font-weight="800">${span}日線</text>`;
      }).join("");
      const ichimokuLine = (values, color, dash = "") => {
        const points = values.map((value, index) => Number.isFinite(value) ? { x: x(index), y: yPrice(value) } : null).filter(Boolean);
        if (points.length < 2) return "";
        return `<path d="${svgPath(points)}" fill="none" stroke="${color}" stroke-width="1.7"${dash ? ` stroke-dasharray="${dash}"` : ""}/>`;
      };
      const ichimokuCloud = showIchimoku ? ichimokuVisible.spanA.map((value, index) => {
        const other = ichimokuVisible.spanB[index];
        if (!Number.isFinite(value) || !Number.isFinite(other)) return null;
        return { index, a: value, b: other };
      }).filter(Boolean) : [];
      const ichimokuCloudShape = ichimokuCloud.length > 1
        ? `<path d="${svgPath(ichimokuCloud.map((point) => ({ x: x(point.index), y: yPrice(point.a) })))} L ${ichimokuCloud.slice().reverse().map((point) => `${x(point.index).toFixed(1)} ${yPrice(point.b).toFixed(1)}`).join(" L ")} Z" fill="#0f766e" opacity=".10" stroke="none"/>`
        : "";
      const ichimokuLines = showIchimoku ? `
        ${ichimokuCloudShape}
        ${ichimokuLine(ichimokuVisible.tenkan, "#e11d48")}
        ${ichimokuLine(ichimokuVisible.kijun, "#1d4ed8")}
        ${ichimokuLine(ichimokuVisible.spanA, "#0f766e")}
        ${ichimokuLine(ichimokuVisible.spanB, "#b45309")}
        ${ichimokuLine(ichimokuVisible.chikou, "#64748b", "4 4")}
        <text x="${width - right - 118}" y="${top + 18 + selectedMas.length * 18}" fill="#0f766e" font-size="13" font-weight="800">一目均衡</text>
      ` : "";
      const zigzagLine = (depth, color) => {
        const points = zigzagPoints(data, depth).map((point) => ({ x: x(point.index), y: yPrice(point.value) }));
        if (points.length < 2) return "";
        return `<path d="${svgPath(points)}" fill="none" stroke="${color}" stroke-width="2.5" stroke-dasharray="6 5"/>`;
      };
      const volumeMax = Math.max(...data.map((row) => row.v || 0), 1);
      const volumeWidth = Math.max(2, Math.min(10, chartWidth / data.length * .58));
      const volumeBars = data.map((row, index) => {
        const value = row.v || 0;
        const barHeight = Math.max(1, value / volumeMax * (volumeHeight - 18));
        const cx = x(index);
        const color = row.c >= row.o ? "#2563eb" : "#dc2626";
        return `<rect x="${(cx - volumeWidth / 2).toFixed(1)}" y="${(volumeTop + volumeHeight - barHeight).toFixed(1)}" width="${volumeWidth.toFixed(1)}" height="${barHeight.toFixed(1)}" fill="${color}" opacity=".38"/>`;
      }).join("");
      const volumePanel = `<text x="${left}" y="${volumeTop - 8}" fill="#334155" font-size="13" font-weight="800">出来高</text><line x1="${left}" y1="${volumeTop + volumeHeight}" x2="${width - right}" y2="${volumeTop + volumeHeight}" stroke="#d9e1dd"/>${volumeBars}<text x="10" y="${volumeTop + 12}" fill="#63716d" font-size="11">${Math.round(volumeMax).toLocaleString("ja-JP")}</text>`;
      let subPanels = "";
      let panelTop = dateLabelY + 28;
      if (showRsi) {
        const rsi = rsiValues(closes);
        const yRsi = (value) => panelTop + (100 - value) * (subHeight - 30) / 100;
        const points = rsi.map((value, index) => Number.isFinite(value) ? { x: x(index), y: yRsi(value) } : null).filter(Boolean);
        subPanels += `<text x="${left}" y="${panelTop - 8}" fill="#334155" font-size="13" font-weight="800">RSI</text><line x1="${left}" y1="${yRsi(70)}" x2="${width - right}" y2="${yRsi(70)}" stroke="#fca5a5"/><line x1="${left}" y1="${yRsi(30)}" x2="${width - right}" y2="${yRsi(30)}" stroke="#93c5fd"/><path d="${svgPath(points)}" fill="none" stroke="#7c3aed" stroke-width="2"/>`;
        panelTop += subHeight;
      }
      if (showMacd) {
        const macdData = macdSeriesBundle(closes);
        const macdValues = macdData.macd.concat(macdData.signal, macdData.histogram).filter(Number.isFinite);
        const min = Math.min(...macdValues);
        const max = Math.max(...macdValues);
        const range = max - min || 1;
        const yMacd = (value) => panelTop + (max - value) * (subHeight - 30) / range;
        const zeroY = yMacd(0);
        const barWidth = Math.max(2, Math.min(8, chartWidth / data.length * .52));
        const histogramBars = macdData.histogram.map((value, index) => {
          const cx = x(index);
          const barY = yMacd(value);
          const color = value >= 0 ? "#2563eb" : "#dc2626";
          return `<rect x="${(cx - barWidth / 2).toFixed(1)}" y="${Math.min(barY, zeroY).toFixed(1)}" width="${barWidth.toFixed(1)}" height="${Math.max(Math.abs(zeroY - barY), 1).toFixed(1)}" fill="${color}" opacity=".62"/>`;
        }).join("");
        const macdPoints = macdData.macd.map((value, index) => ({ x: x(index), y: yMacd(value) }));
        const signalPoints = macdData.signal.map((value, index) => ({ x: x(index), y: yMacd(value) }));
        subPanels += `<text x="${left}" y="${panelTop - 8}" fill="#334155" font-size="13" font-weight="800">MACD</text><line x1="${left}" y1="${zeroY}" x2="${width - right}" y2="${zeroY}" stroke="#d9e1dd"/>${histogramBars}<path d="${svgPath(macdPoints)}" fill="none" stroke="#dc2626" stroke-width="2"/><path d="${svgPath(signalPoints)}" fill="none" stroke="#2563eb" stroke-width="1.7"/>`;
      }
      const periodLabel = { daily: "日足", weekly: "週足", monthly: "月足" }[period] || "日足";
      title.textContent = `${stock?.name || selectedCode} (${selectedCode}) ${periodLabel} ローソク足`;
      document.title = `${stock?.name || selectedCode} チャート`;
      stage.innerHTML = `<svg viewBox="0 0 ${width} ${height}" role="img" aria-label="${stock?.name || selectedCode}のチャート">
        ${grid}
        ${boundaryLines}
        ${candles}
        ${ichimokuLines}
        ${maLines}
        ${showZigzag7 ? zigzagLine(7, "#2563eb") : ""}
        ${showZigzag20 ? zigzagLine(20, "#b45309") : ""}
        ${volumePanel}
        ${dateLabels}
        ${subPanels}
      </svg>`;
      const fetched = window.priceHistoryFetchedAt ? new Date(window.priceHistoryFetchedAt).toLocaleString("ja-JP", { timeZone: "Asia/Tokyo" }) : "—";
      const schedule = window.priceHistoryScheduledFetchTime || "平日 15:30";
      meta.textContent = `株価データ取得: ${fetched} / 更新予定: ${schedule} / 終値: ${closes.at(-1).toLocaleString("ja-JP")}円`;
      const svg = stage.querySelector("svg");
      if (svg) {
        addCrosshair(svg, { data, width, top, left, right, mainHeight, chartWidth: x(data.length - 1) - left, maxPrice, minPrice, pad });
      }
    }

    populateStocks();
    renderChart();
    select.addEventListener("change", () => {
      selectedCode = select.value;
      history.replaceState(null, "", `?code=${encodeURIComponent(selectedCode)}`);
      renderChart();
    });
    document.querySelectorAll("input[name='chartPeriod'], .chart-ma, #chartRsi, #chartMacd, #chartIchimoku, #chartZigzag7, #chartZigzag20").forEach((input) => {
      input.addEventListener("change", renderChart);
    });
  </script>
</body>
</html>
